          texto: "Mãe solo de dois, trabalho o dia todo. Achei que era impossível ter rotina de jeito nenhum. Mas com 7 minutos antes do jantar — mesmo 7 minutos — o clima em casa mudou completamente. Eles agora se ajudam. Eu ainda não acredito."
