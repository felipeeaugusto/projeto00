# ============================================================
# GUIA DE USO DOS ESTILOS — QUANDO USAR CADA UM
# ============================================================

visual_styles_guide:

  mapeamento_por_objetivo:
    hook_abertura: "S01 (Bold) — impacto imediato, para o scroll"
    educativo_reflexivo: "S03 (Collage) — profundidade, autoridade, método"
    prova_social: "S04 (Depoimento) — resultado real, transformação, emoção"

  estrutura_carrossel_padrao:
    slide_1:
      estilo: "S01 (Bold)"
      funcao: "Hook — para o scroll. Número ou frase de impacto."
      exemplo: "7 MIN. / por dia."
    slide_2:
      estilo: "S03 (Collage)"
      funcao: "Contexto — explica o problema que o método resolve"
      exemplo: "Se a rotina é fraca, a família naufraga."
    slide_3:
      estilo: "S03 (Collage)"
      funcao: "Método — explica como funciona, dá confiança"
      exemplo: "O que falta não é força de vontade. É método."
    slide_4:
      estilo: "S04 (Depoimento)"
      funcao: "Prova — resultado real de uma mãe"
      exemplo: "Camila R. — São Paulo — 2 semanas de resultado"
    slide_5:
      estilo: "S01 (Bold) ou S03 (Collage)"
      funcao: "CTA — ação clara para o leitor"
      exemplo: "O ebook está no link da bio. R$27."

  combinacoes_proibidas:
    - "S01 + S01 consecutivos (mesmo estilo em sequência — sem variação)"
    - "S03 sem quote block — descaracteriza o estilo"
    - "S04 sem depoimento fictício — o card vazio não tem propósito"
    - "Misturar fontes entre estilos (ex: Bebas Neue no S03)"

  adaptacao_por_formato:
    post_unico:
      usar: "S01 (Bold) para hooks | S04 (Depoimento) para prova social isolada"
      evitar: "S03 em post único — muito texto para uma peça só"
    carrossel_3_slides:
      estrutura: "S01 (hook) → S03 (contexto) → S04 (prova social + CTA)"
    carrossel_6_slides:
      estrutura: "S01 → S03 → S03 → S04 → S03 → S01 (CTA)"
    story:
      nota: "Adaptar para 1080x1920px — mesmos estilos, layout vertical"

