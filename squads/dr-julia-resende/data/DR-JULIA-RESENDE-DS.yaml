        linha_divisoria:
          posicao: "top:710px left:64px"
          dimensoes: "120px × 2px"
          cor: "rgba(255,255,255,0.15)"

      zona_base:
        descricao: "Tag de apoio + navegação"
        tag_box:
          posicao: "top:820px right:64px"
          fundo: "#03bb85"
          padding: "16px 28px"
          texto_estilo: "Poppins 19px weight:300 color:#0a0a0a text-align:right"
          bold: "font-weight:700 na palavra-chave"
          exemplo: "Não é sobre ter mais tempo. É sobre usá-lo certo."
        rodape:
          posicao: "bottom:52px left:64px right:64px"
          estrutura: "flex space-between: nome | dots | cta"
          nome: "Poppins 17px weight:300 rgba(255,255,255,0.25) — 'Dra. Julia Resende'"
          dots: "dot 7px cinza + dot.active 28px verde (slide atual)"
          cta: "Poppins 17px weight:600 #03bb85 uppercase — 'deslize →'"

    regras_especificas:
      - "O número/palavra grande SEMPRE centralizado — nunca left-aligned"
      - "Máximo 2 fontes por slide (Bebas Neue + Poppins OU Playfair + Poppins)"
      - "Tag box no canto inferior direito com fundo verde — texto contrastante"
      - "Hierarquia obrigatória: gigante (verde) > grande (branco) > pequeno (transparente)"

