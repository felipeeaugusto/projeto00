# ============================================================
# ESTILOS VISUAIS APROVADOS — HTML/CSS + PLAYWRIGHT
# v3.0 | Atualizado por: Atlas (@analyst) — 2026-03-18
#
# REGRA CRÍTICA: Estes estilos substituem TODOS os formatos
# baseados em Python/Pillow + DALL-E para carrosséis e posts.
# A ferramenta de renderização é HTML/CSS + Playwright → PNG 1080x1080.
# NÃO usar Python/Pillow para criação visual. NUNCA.
#
# Referência de protótipos aprovados:
#   squads/dr-julia-resende/prototipo-carrosseis/estilo-01-bold.html
#   squads/dr-julia-resende/prototipo-carrosseis/estilo-03-collage.html
#   squads/dr-julia-resende/prototipo-carrosseis/estilo-04-depoimento.html
# ============================================================

visual_styles_approved:

  ferramenta:
    renderizacao: "HTML/CSS → Playwright → PNG 1080x1080"
    comando: "npx playwright screenshot --viewport-size='1080,1080' {arquivo.html} {saida.png}"
    fontes: "Google Fonts via @import (Bebas Neue, Playfair Display, Poppins)"
    dimensoes: "1080x1080px (posts e carrosséis) | 1080x1920px (stories)"
    descartado: "Python/Pillow — NUNCA usar para criação visual"

  padrao_qualidade:
    nivel: "Equivalente a contas de referência: Academia Lendária, layerlemonade, editoriais premium"
    regra_01: "Todo post deve PARAR O SCROLL — não pode ser genérico"
    regra_02: "NUNCA misturar cores dentro do mesmo post"
    regra_03: "Cada peça tem um hook claro, texto que prende, ação definida"
    regra_04: "O público são mães brasileiras — a mensagem conversa com elas diretamente"
    regra_05: "Simplicidade visual = impacto máximo. Menos elementos, mais força."
    anti_padrao_01: "❌ Clipart, ícones genéricos, elementos decorativos desnecessários"
    anti_padrao_02: "❌ Foto da Julia no carrossel (não temos fotografia profissional disponível)"
    anti_padrao_03: "❌ Cores misturadas no mesmo slide (usar só verde #03bb85, branco #fff ou preto #0a0a0a)"
    anti_padrao_04: "❌ Layout amateur: colunas desalinhadas, espaçamentos irregulares, hierarquia quebrada"
    anti_padrao_05: "❌ Texto longo demais — se cabe em 3 linhas, não escreva em 6"

  # ----------------------------------------------------------
  # ESTILO 01 — BOLD
  # Inspiração: tipografia gigante editorial, fundo escuro
  # Use para: hooks de impacto, revelação de método, números
  # ----------------------------------------------------------
  estilo_01_bold:
    nome: "Bold"
    codigo: "S01"
    prototipo: "squads/dr-julia-resende/prototipo-carrosseis/estilo-01-bold.html"
    png_aprovado: "squads/dr-julia-resende/prototipo-carrosseis/estilo-01-bold.png"
    status: "APROVADO por Felipe — 2026-03-17"

    identidade_visual:
      descricao: "Fundo escuro quase preto com tipografia massiva. Impacto visual máximo por contraste e escala."
      sentimento: "Poderoso, moderno, direto. Para quem não tem tempo a perder."
      quando_usar: "Slide de abertura de carrossel, post de hook, revelação de número impactante"

    cores:
      fundo: "#0a0a0a"
      texto_primario: "#ffffff"
      texto_destaque: "#03bb85"
      texto_apoio: "rgba(255,255,255,0.45)"
      tag_box_fundo: "#03bb85"
      tag_box_texto: "#0a0a0a"

    tipografia:
      fonte_principal: "Poppins (weights: 300, 700)"
      fonte_display: "Bebas Neue (apenas para número gigante)"
      fonte_editorial: "Playfair Display italic (apenas para frase de contexto)"
      hierarquia:
        nivel_1: "Bebas Neue 260px — número/palavra impacto (cor verde #03bb85)"
        nivel_2: "Poppins 80px Bold — palavra de contexto (cor branco #fff)"
        nivel_3: "Playfair Display 54px italic — frase de setup (cor rgba(255,255,255,0.55))"
