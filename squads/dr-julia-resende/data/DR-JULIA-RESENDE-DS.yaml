# ============================================================
# COMPOSITOR PYTHON — SISTEMA DE FIDELIDADE DE COR
# ============================================================
# PROBLEMA RESOLVIDO: DALL-E não mantém #03bb85 fiel entre gerações.
# SOLUÇÃO: Python gera o fundo com cor exata. DALL-E gera apenas o
# elemento artístico (sem fundo). O compositor monta as camadas.
# USUÁRIO NÃO FAZ NADA MANUALMENTE — tudo automático.
# ============================================================

python_compositor:

  descricao: >
    Script Python que monta as imagens finais por camadas.
    O DALL-E gera apenas elementos artísticos isolados (sem fundo, sem texto).
    O compositor adiciona: fundo de cor exata, elemento DALL-E, texto em
    Poppins, @drjuliaresende e logo. Saída: PNG 1080x1080px pronto para publicar.

  responsavel_construcao: "@dev (Dex)"
  status: "PENDENTE — PRD deve ser criado antes da implementação"
  prd_required: true

  output_padrao:
    feed: "1080x1080px PNG"
    story: "1080x1920px PNG"
    qualidade: "RGB, 72dpi, sRGB"

  camadas_fixas:
    layer_01_fundo:
      tipo: "Gerado por código Python (100% fiel)"
      verde: "RGB(3, 187, 133) = #03bb85"
      branco: "RGB(255, 255, 255) = #FFFFFF"
      escuro: "RGB(10, 46, 42) = #0a2e2a"
      regra: "NUNCA regenerar — cor vem do código, não do DALL-E"

    layer_02_elemento:
      tipo: "Gerado por DALL-E"
      regra: "Elemento artístico APENAS — sem fundo, sem texto, sem logo"
      formato_dalle: "PNG com fundo branco ou neutro (removido no compositor)"

    layer_03_texto:
      tipo: "Adicionado por código Python"
      fonte: "Poppins (arquivo .ttf instalado)"
      pesos: ["Regular", "SemiBold", "Bold", "ExtraBold"]
      cor_sobre_verde: "#FFFFFF"
      cor_sobre_branco: "#1A1A1A"
      regra: "NUNCA usar DALL-E para texto — sempre Python"

    layer_04_assinatura:
      tipo: "Adicionado por código Python"
      valor: "@drjuliaresende"
      posicao: "bottom-right, margem 24px"
      tamanho: "14px"
      cor_sobre_verde: "#FFFFFF"
      cor_sobre_branco: "#1A1A1A"

    layer_05_logo:
      tipo: "Arquivo PNG fixo sobrepostos"
      arquivo_verde: "logo-abraco-branco.png"
      arquivo_branco: "logo-abraco-preto.png"
      posicao: "bottom-right (junto com assinatura ou substituindo)"

  fluxo_imagem_agent:
    passo_1: "Lê o formato do DS.yaml (receita do formato escolhido)"
    passo_2: "Gera prompt DALL-E apenas para o elemento artístico"
    passo_3: "Chama DALL-E → salva layer_02_elemento.png"
    passo_4: "Chama compositor Python com: cor_fundo, elemento, texto, assinatura"
    passo_5: "Compositor monta e salva arquivo final pronto"
    passo_6: "Apresenta para approval_agent → usuário aprova"

  assets_fixos:
    fundo_verde: "assets/fundo-verde-01.png"
    fundo_branco: "assets/fundo-branco-01.png"
    fundo_escuro: "assets/fundo-escuro-01.png"
    story_verde: "assets/story-fundo-verde-01.png"
    story_branco: "assets/story-fundo-branco-01.png"
    regra: "Gerados UMA VEZ pelo compositor. Nunca regenerados pelo DALL-E."

