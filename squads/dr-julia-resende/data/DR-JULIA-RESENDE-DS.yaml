# ============================================================
# CONTENT FORMATS
# ============================================================

formats:

  formato_1_post_unico:
    name: "Post Único"
    slides: 1
    purpose: "Frase de impacto rápida — alta taxa de save/compartilhamento"
    structure:
      slide_1:
        line_1:
          weight: "Regular"
          content: "Frase que nomeia a dor"
        line_2:
          weight: "Extra Bold"
          content: "Virada ou solução curta"
        footer: "@drjuliaresende"
    example:
      line_1: "Seu filho faz birra toda noite?"
      line_2: "A rotina de 7 minutos resolve."
    pillar: ["EM", "C"]

  formato_2_carrossel_educativo:
    name: "Carrossel Educativo"
    slides: 5
    purpose: "Ensinar, gerar salvamentos, mostrar autoridade"
    structure:
      slide_1:
        role: "Gancho"
        content: "Dor ou promessa"
      slide_2:
        role: "Por que acontece"
        content: "Validação científica"
      slide_3:
        role: "Passo 1 da solução"
        content: "Ação prática"
      slide_4:
        role: "Passo 2 da solução"
        content: "Ação prática"
      slide_5:
        role: "CTA"
        content: "Gostou? Clique no Link da Bio!"
        layout: "layer_4_cta + layer_5_icons"
    pillar: ["E"]

  formato_3_carrossel_prova_social:
    name: "Carrossel Prova Social"
    slides: 4
    purpose: "Construir confiança, mostrar resultados"
    structure:
      slide_1:
        role: "Gancho com número real"
        content: "15.000 famílias..."
      slide_2:
        role: "Transformação"
        content: "Antes/depois em texto"
      slide_3:
        role: "O que mudou e por quê"
        content: "Explicação prática"
      slide_4:
        role: "CTA"
        content: "Gostou? Clique no Link da Bio!"
        layout: "layer_4_cta + layer_5_icons"
    pillar: ["PS"]

  formato_4_story_frase_impacto:
    name: "Story Frase de Impacto"
    type: "story"
    purpose: "Alcance orgânico, visualizações rápidas"
    template: "tipo_1_frase_impacto"
    structure:
      center: "Frase curta (Regular + Extra Bold)"
      footer: "@drjuliaresende"

  formato_5_story_sticker:
    name: "Story Sticker Interativo"
    type: "story"
    purpose: "Engajamento — enquete, caixa de perguntas, contagem"
    template: "tipo_2_sticker"
    structure:
      top: "Frase curta provocativa"
      center_bottom: "VAZIO — sticker adicionado manualmente no Instagram"
      footer: "@drjuliaresende"
    manual_step: "Usuário adiciona sticker interativo no Instagram após gerar imagem"

# ============================================================
# ALTERNATION LOGIC
# ============================================================

alternation_logic:

  description: "Sistema de 3 contadores para geração automática de conteúdo"

  counter_1_color:
    name: "Contador de cor"
    rule: "Post ímpar → Verde | Post par → Branco"
    mapping:
      odd: "layout_verde"
      even: "layout_branco"
    tracks: "post_number"

  counter_2_content:
    name: "Contador de conteúdo"
    cycle: ["E", "EM", "PS", "C"]
    mapping:
      E:
        pillar: "Educativo"
        format: "formato_2_carrossel_educativo"
      EM:
        pillar: "Emocional"
        format: "formato_1_post_unico"
      PS:
        pillar: "Prova Social"
        format: "formato_3_carrossel_prova_social"
      C:
        pillar: "CTA"
        format: "formato_1_post_unico"
    tracks: "cycle_position"

  counter_3_schedule:
    name: "Calendário semanal"
    feed_days: ["segunda", "quarta", "sexta", "sabado"]
    story_days:
      terca: "formato_4_story_frase_impacto"
      quinta: "formato_5_story_sticker"
      domingo: "formato_4_story_frase_impacto"
    rule_story_color: "Alternância verde/branco independente, baseada em story_number"

  weekly_pattern:
    segunda:
      type: "feed"
      use: "counter_1 + counter_2"
    terca:
      type: "story"
      format: "formato_4_story_frase_impacto"
    quarta:
      type: "feed"
      use: "counter_1 + counter_2"
    quinta:
      type: "story"
      format: "formato_5_story_sticker"
    sexta:
      type: "feed"
      use: "counter_1 + counter_2"
    sabado:
      type: "feed"
      use: "counter_1 + counter_2"
    domingo:
      type: "story"
      format: "formato_4_story_frase_impacto"

  monthly_volume:
    feed_posts: 16
    stories: 28
    breakdown:
      carrossel_educativo: 4
      post_unico_emocional: 4
      carrossel_prova_social: 4
      post_unico_cta: 4
      story_frase_impacto: 14
      story_sticker: 14

# ============================================================
# COPY SYSTEM — TOM DE VOZ
# ============================================================

copy_system:

  communication_formula: "Dor reconhecida → Validação científica → Solução prática → Esperança"

  voice:
    authority: "Científica mas nunca fria — cita dados de forma acessível"
    empathy: "Fala de igual para igual — 'eu também sou mãe, eu entendo'"
    practicality: "Sem rodeios — entrega solução simples e aplicável"
    hope: "Nunca culpa — sempre abre uma saída positiva"
    vocabulary: "Claro, direto, sem jargão técnico"
    pronoun: "você — NUNCA 'vocês' ou 'mamãe'"

  # Voice DNA enriquecido — validado contra nicho real psicologia infantil BR
  # Fontes: Vera Iaconelli, Ana Luiza Pinheiro, Luciane Najar
  # Extraído por @oalanicolas em 2026-03-13
  niche_vocabulary:
    use_always:
      - "regulação emocional — ao explicar por que a criança age de forma intensa"
      - "co-regulação — ao ensinar que o adulto precisa se acalmar primeiro"
      - "birra é comunicação — reframe de comportamento difícil"
      - "vínculo — ao falar de conexão emocional pais-filhos"
      - "conexão antes de correção — ao ensinar sobre disciplina"
      - "sistema nervoso imaturo — ao traduzir ciência de forma acessível"
      - "necessidade por trás do comportamento — ao ensinar a mãe a ler o filho"
      - "ambiente suficientemente bom — ao liberar a mãe da pressão da perfeição"
    never_use:
      - "criança manipuladora"
      - "ignora que passa"
      - "você deixa fazer tudo"
      - "no meu tempo era assim"
      - "limite como punição"

  opening_patterns:
    pattern_dor_mae: "[Comportamento do filho que esgota] + [Validação da mãe]"
    pattern_crenca_errada: "A gente aprende que [crença popular]. Mas [verdade contraintuitiva]."
    pattern_eu_tambem: "Eu também [senti/errei/fiz]. E aprendi que [insight]."

  validation_formula:
    step_1: "Nomeia a emoção DA MÃE (não do filho)"
    step_2: "Valida que é normal sentir isso"
    step_3: "Reframe do comportamento do filho com ciência acessível"
    step_4: "Solução prática em 1-2 passos"
    step_5: "Fechamento com esperança — não com obrigação"
    example:
      step_1: "Você gritou hoje. Tá tudo bem."
      step_2: "Qualquer mãe perde a paciência. Isso não te faz uma mãe ruim."
      step_3: "Seu filho não estava tentando te provocar — o sistema nervoso dele ainda não sabe regular sozinho."
