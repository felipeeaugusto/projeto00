    slide_structure:
      slide_1: "Você não é"
      slide_2: "uma mãe"
      slide_3: "ruiiiiiiiiim..."
      slide_4: "Você só está"
      slide_5: "sem rotina. 💚 @drjuliaresende"
    copy_guidance: "Frase que valida a mãe — revelada letra por letra entre slides"
    example_julia:
      frase_completa: "Você não é uma mãe ruim. Você só está sem rotina."
      variacao: "Gritar não te faz uma mãe ruim. Te faz humana."

  formato_15_visual_impact:
    name: "Visual Impact"
    code: "VI"
    inspiracao: "ref01/1.2 — Grupo Boticário / Eudora"
    pillar: ["EM", "E"]
    use_case: "Imagem poderosa de elemento humano grande + frase mínima — para máximo impacto emocional"
    fundo: "Verde #03bb85"
    dalle_element:
      descricao: "Elemento humano grande e abstrato — mãos, abraço, silhueta"
      prompt_template: >
        Large scale human element, minimalist illustration style,
        {ELEMENTO_HUMANO}, occupying most of the image space,
        white or light colored illustration on transparent background,
        clean lines, no background color, isolated element,
        emotional but not photographic — illustration style,
        no faces visible, silhouette or abstract form,
        no text, no logos, no watermarks
    compositor:
      layer_01: "Fundo verde #03bb85 (código Python)"
      layer_02: "Elemento humano grande DALL-E (ocupa 70% da imagem)"
      layer_03: "Frase mínima em Poppins ExtraBold branco (1-2 palavras impactantes)"
      layer_04: "@drjuliaresende (bottom-right, branco)"
    copy_guidance: "Menos é mais — frase de 2 a 5 palavras. O visual diz o resto."
    example_julia:
      elemento: "Mother and child silhouette in embrace, seen from above"
      frase: "Ela só precisa de você."
      variacao: "Presente no choro. Presente na paz."

