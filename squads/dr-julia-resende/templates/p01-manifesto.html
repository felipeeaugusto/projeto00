<!DOCTYPE html>
<!--
  TEMPLATE: P01 — Manifesto (Post único 1:1)
  Estilo: DS.yaml → visual_styles_approved → estilo_p01_manifesto
  Dimensões: 1080x1080px
  Comando: npx playwright screenshot --viewport-size="1080,1080" p01-manifesto.html output.png
  Variáveis a substituir:
    {EYEBROW}    → categoria/tema (ex: MÃE PRESENTE)
    {HEADLINE_1} → primeira linha do headline
    {HEADLINE_2} → segunda linha com <em>palavra</em> em itálico verde
    {SUBTEXT_1}  → primeira linha do subtext
    {SUBTEXT_2}  → segunda linha do subtext (pode ser <strong>texto</strong>)
-->
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Poppins:wght@300;400;600&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    width:1080px; height:1080px; overflow:hidden;
    background:#f7f3ee; position:relative;
    font-family:'Poppins', sans-serif;
  }
  .handle {
    position:absolute; top:52px; right:64px;
    font-size:16px; font-weight:300; letter-spacing:2px;
    color:rgba(26,26,26,0.35); z-index:10;
  }
  .content {
    position:absolute;
    top:50%; left:64px; right:64px;
    transform:translateY(-52%);
    display:flex; flex-direction:column;
    align-items:center; text-align:center;
    z-index:10;
  }
  .eyebrow {
    font-size:14px; font-weight:300;
    letter-spacing:6px; text-transform:uppercase;
    color:#03bb85; margin-bottom:36px;
  }
  .headline {
    font-family:'DM Serif Display', serif;
    font-size:72px; line-height:1.08;
    color:#1a1a1a; letter-spacing:-0.5px;
    margin-bottom:40px;
  }
  .headline em {
    font-style:italic; color:#03bb85;
  }
  .divider {
    width:72px; height:2px;
    background:#03bb85; margin-bottom:36px;
  }
  .subtext {
    font-size:24px; font-weight:300;
    color:rgba(26,26,26,0.6); line-height:1.6;
    max-width:820px;
  }
  .subtext strong {
    font-weight:600; color:#1a1a1a;
  }
  .signature {
    position:absolute; bottom:52px;
    left:0; right:0; text-align:center;
    font-size:15px; font-weight:300;
    letter-spacing:2px; color:#03bb85;
    z-index:10;
  }
</style>
</head>
<body>
  <span class="handle">@drjuliaresende</span>
  <div class="content">
    <p class="eyebrow">{EYEBROW}</p>
    <h1 class="headline">
      {HEADLINE_1}<br>
      {HEADLINE_2}
    </h1>
    <div class="divider"></div>
    <p class="subtext">
      {SUBTEXT_1}<br>
      {SUBTEXT_2}
    </p>
  </div>
  <p class="signature">@drjuliaresende</p>
</body>
</html>
