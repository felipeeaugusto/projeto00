<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Poppins:wght@300;400;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      background: #03bb85;
      position: relative;
      font-family: 'Poppins', sans-serif;
    }

    /* Linhas de textura sutil */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 3px,
          rgba(255,255,255,0.04) 3px,
          rgba(255,255,255,0.04) 4px
        );
      z-index: 0;
    }

    .handle {
      position: absolute;
      top: 52px;
      right: 72px;
      font-size: 18px;
      font-weight: 300;
      color: rgba(255,255,255,0.55);
      letter-spacing: 1px;
      z-index: 10;
    }

    .content {
      position: relative;
      z-index: 10;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 100px;
    }

    .eyebrow {
      font-size: 16px;
      font-weight: 400;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
      margin-bottom: 36px;
    }

    .title {
      font-family: 'Poppins', sans-serif;
      font-size: 72px;
      font-weight: 800;
      line-height: 1.08;
      color: #FFFFFF;
      margin-bottom: 18px;
    }

    .subtitle {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 36px;
      font-weight: 400;
      color: rgba(255,255,255,0.8);
      margin-bottom: 60px;
    }

    .divider {
      width: 50px;
      height: 2px;
      background: rgba(255,255,255,0.4);
      margin: 0 auto 60px auto;
    }

    .cta-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .cta-line1 {
      font-size: 26px;
      font-weight: 300;
      color: rgba(255,255,255,0.85);
    }

    .cta-line2 {
      font-size: 28px;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: 1px;
    }

    .cta-arrow {
      font-size: 18px;
      font-weight: 400;
      color: rgba(255,255,255,0.7);
      letter-spacing: 3px;
      margin-top: 8px;
    }

    .dots {
      position: absolute;
      bottom: 58px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .dot {
      height: 7px;
      border-radius: 10px;
      background: rgba(255,255,255,0.3);
      width: 7px;
    }

    .dot.active {
      background: #FFFFFF;
      width: 28px;
    }
  </style>
</head>
<body>
  <div class="handle">@drjuliaresende</div>

  <div class="content">
    <p class="eyebrow">o método</p>
    <h2 class="title">O Poder<br>da Rotina</h2>
    <p class="subtitle">7 minutos por dia para<br>transformar o caos em paz</p>
    <div class="divider"></div>
    <div class="cta-block">
      <span class="cta-line1">15.000 mães já transformaram a família.</span>
      <span class="cta-line2">Link na Bio.</span>
      <span class="cta-arrow">↑</span>
    </div>
  </div>

  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot active"></div>
  </div>
</body>
</html>
