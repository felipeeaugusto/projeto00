<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400;1,700&family=Poppins:wght@300;400;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    width:1080px; height:1080px; overflow:hidden;
    background:#111; position:relative; font-family:'Poppins',sans-serif;
  }

  /* Gradiente de fundo sutil */
  body::before {
    content:''; position:absolute; inset:0;
    background: radial-gradient(ellipse at 30% 50%, rgba(3,187,133,0.06) 0%, transparent 60%);
    z-index:0;
  }

  /* Linhas de textura horizontal */
  body::after {
    content:''; position:absolute; inset:0;
    background: repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 6px);
    z-index:1;
  }

  .handle {
    position:absolute; top:52px; right:64px;
    font-size:17px; font-weight:300; letter-spacing:2px;
    color:rgba(255,255,255,0.3); z-index:10;
  }

  /* Número grande decorativo de fundo */
  .bg-number {
    position:absolute; bottom:-40px; right:40px;
    font-family:'Playfair Display', serif;
    font-size:340px; font-weight:700;
    color:rgba(255,255,255,0.03); z-index:2;
    line-height:1;
  }

  /* Linha de topo — acento verde */
  .top-bar {
    position:absolute; top:0; left:0; right:0;
    height:6px; background:#03bb85; z-index:10;
  }

  /* Eyebrow */
  .eyebrow {
    position:absolute; top:72px; left:64px;
    font-size:15px; font-weight:300; letter-spacing:6px;
    text-transform:uppercase; color:#03bb85; z-index:10;
  }

  /* Título principal — ocupa toda a largura */
  .main-title {
    position:absolute; top:130px; left:64px; right:64px; z-index:10;
  }
  .main-title h1 {
    font-family:'Playfair Display', serif;
    font-size:82px; line-height:1.08; font-weight:700;
    color:#f5f0e8;
  }
  .main-title h1 em {
    font-style:italic; color:#03bb85;
  }
  .main-title h1 span {
    display:block;
  }

  /* Linha divisória — após o título (~130 + 82*4*1.08 = ~484px) */
  .divider {
    position:absolute; top:510px; left:64px;
    width:64px; height:3px; background:#03bb85; z-index:10;
  }

  /* Texto corpo */
  .body-text {
    position:absolute; top:534px; left:64px; right:64px; z-index:10;
  }
  .body-text p {
    font-size:24px; font-weight:300;
    color:rgba(245,240,232,0.65); line-height:1.7;
  }
  .body-text p strong { color:#f5f0e8; font-weight:600; }

  /* Bloco de citação em destaque */
  .quote-block {
    position:absolute; top:700px; left:64px; right:64px;
    border-left:4px solid #03bb85;
    padding:22px 32px; z-index:10;
    background:rgba(3,187,133,0.06);
  }
  .quote-block p {
    font-family:'Playfair Display', serif;
    font-style:italic; font-size:26px;
    color:#f5f0e8; line-height:1.5;
  }
  .quote-block cite {
    display:block; margin-top:10px;
    font-size:15px; font-weight:300; font-style:normal;
    color:rgba(255,255,255,0.4); letter-spacing:1px;
  }

  /* Rodapé */
  .footer {
    position:absolute; bottom:52px; left:64px; right:64px;
    display:flex; align-items:center; justify-content:space-between; z-index:10;
  }
  .footer-tag {
    font-size:17px; font-weight:300;
    color:rgba(255,255,255,0.3); letter-spacing:1px;
  }
  .footer-dots { display:flex; gap:10px; align-items:center; }
  .dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,0.15); }
  .dot.active { background:#03bb85; width:28px; border-radius:4px; }
</style>
</head>
<body>
  <div class="top-bar"></div>
  <span class="handle">@drjuliaresende</span>
  <div class="bg-number">01</div>

  <p class="eyebrow">O método</p>

  <div class="main-title">
    <h1>
      <span>Se a rotina</span>
      <span>é <em>fraca,</em></span>
      <span>a família</span>
      <span>naufraga.</span>
    </h1>
  </div>

  <div class="divider"></div>

  <div class="body-text">
    <p>Toda mãe quer estar presente.<br>
    O que falta é saber <strong>exatamente o que fazer</strong><br>
    nos momentos que mais importam.</p>
  </div>

  <div class="quote-block">
    <p>"E a culpa não é sua — é da falta do método certo."</p>
    <cite>— Dra. Julia Resende</cite>
  </div>

  <div class="footer">
    <span class="footer-tag">O Poder da Rotina</span>
    <div class="footer-dots">
      <div class="dot active"></div>
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  </div>
</body>
</html>
