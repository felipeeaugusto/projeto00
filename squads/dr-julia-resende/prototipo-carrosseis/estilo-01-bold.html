<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital@1&family=Poppins:wght@300;400;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    width:1080px; height:1080px; overflow:hidden;
    background:#0a0a0a; position:relative;
    font-family:'Poppins', sans-serif;
  }

  /* ── ZONA TOPO ─────────────────────────── */
  .handle {
    position:absolute; top:52px; left:64px;
    font-size:17px; font-weight:300; letter-spacing:3px;
    color:rgba(255,255,255,0.3); z-index:10;
  }
  .star {
    position:absolute; top:44px; right:64px;
    font-size:52px; color:#03bb85; z-index:10;
    line-height:1;
  }

  /* Linha topo pequena */
  .line-small-top {
    position:absolute; top:168px; left:64px;
    font-size:20px; font-weight:300; letter-spacing:5px;
    text-transform:uppercase; color:rgba(255,255,255,0.45);
    z-index:10;
  }

  /* ── ZONA MEIO — título principal ───────── */
  /* Linha 1: "a diferença entre" — Playfair italic, médio */
  .line-italic {
    position:absolute; top:218px; left:64px;
    font-family:'Playfair Display', serif;
    font-style:italic; font-size:54px;
    color:rgba(255,255,255,0.55); z-index:10;
    letter-spacing:-1px;
  }

  /* Linha 2: "7 MIN." — Bebas Neue, enorme, verde — centralizado */
  .line-huge {
    position:absolute; top:330px; left:0; right:0;
    font-family:'Bebas Neue', sans-serif;
    font-size:260px; line-height:0.88;
    color:#03bb85; z-index:10;
    letter-spacing:-2px;
    text-align:center;
  }

  /* Linha 3: "por dia." — centralizado */
  .line-medium {
    position:absolute; top:720px; left:0; right:0;
    font-family:'Poppins', sans-serif;
    font-size:80px; font-weight:700; line-height:1;
    color:#fff; z-index:10; letter-spacing:-1px;
    text-align:center;
  }

  /* Tag preta de destaque — lado direito */
  .tag-box {
    position:absolute; top:820px; right:64px;
    background:#03bb85; padding:16px 28px;
    z-index:10;
  }
  .tag-box p {
    font-size:19px; font-weight:300;
    color:#0a0a0a; line-height:1.4;
    text-align:right;
  }
  .tag-box strong { font-weight:700; }

  /* Linha horizontal decorativa */
  .h-line {
    position:absolute; top:710px; left:64px;
    width:120px; height:2px;
    background:rgba(255,255,255,0.15); z-index:10;
  }

  /* ── ZONA BASE ──────────────────────────── */
  .footer {
    position:absolute; bottom:52px; left:64px; right:64px;
    display:flex; align-items:center; justify-content:space-between;
    z-index:10;
  }
  .footer-text {
    font-size:17px; font-weight:300; letter-spacing:1px;
    color:rgba(255,255,255,0.25);
  }
  .footer-cta {
    font-size:17px; font-weight:600; letter-spacing:2px;
    color:#03bb85; text-transform:uppercase;
  }
  .footer-dots { display:flex; gap:10px; align-items:center; }
  .dot { width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,0.2); }
  .dot.active { background:#03bb85; width:28px; border-radius:4px; }
</style>
</head>
<body>

  <!-- TOPO -->
  <span class="handle">@drjuliaresende</span>
  <span class="star">✦</span>
  <p class="line-small-top">O Poder da Rotina</p>

  <!-- MEIO -->
  <p class="line-italic">a diferença entre caos e paz:</p>
  <p class="line-huge">7<br>MIN.</p>
  <div class="h-line"></div>
  <p class="line-medium">por dia.</p>

  <div class="tag-box">
    <p>Não é sobre ter<br>mais tempo.<br><strong>É sobre usá-lo certo.</strong></p>
  </div>

  <!-- BASE -->
  <div class="footer">
    <span class="footer-text">Dra. Julia Resende</span>
    <div class="footer-dots">
      <div class="dot active"></div>
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <span class="footer-cta">deslize →</span>
  </div>

</body>
</html>
